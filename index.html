<!DOCTYPE html>

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Full Movie Link</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
*{box-sizing:border-box}
html,body{margin:0;padding:0;background:#fff;font-family:Arial,Helvetica,sans-serif;color:#222}
.navbar{height:70px;background:#f1f1f1;border-bottom:1px solid #ddd;display:flex;align-items:center;justify-content:space-between;padding:0 20px;position:sticky;top:0;z-index:1000}
.nav-icon{font-size:21px;color:#333;cursor:pointer;width:36px;text-align:center}
.logo{position:absolute;left:50%;transform:translateX(-50%);font-size:28px;font-family:"Brush Script MT","Segoe Script",cursive;font-weight:500;color:#222;white-space:nowrap}
.page{width:100%;padding-top:10px;padding-bottom:30px}
.image-list{width:100%;max-width:760px;margin:0 auto;padding:0 10px;display:flex;flex-direction:column;align-items:center}
.item{width:100%;text-align:center;display:block;margin:10px auto;text-decoration:none;cursor:pointer}
.item img{width:auto;max-width:100%;height:auto;display:block;margin:0 auto;border:0;box-shadow:none;border-radius:0}
.popup{position:fixed;inset:0;background:rgba(0,0,0,.78);display:none;align-items:center;justify-content:center;z-index:99999;padding:20px}
.popup.active{display:flex}
.popup-box{width:100%;max-width:340px;background:#fff;border-radius:12px;text-align:center;padding:22px 18px;box-shadow:0 10px 35px rgba(0,0,0,.3)}
.popup-box h3{margin:0 0 14px;font-size:21px;color:#111}
.popup-box p{margin:0 0 16px;color:#555;font-size:14px}
.go-btn{display:block;background:#111;color:#fff;text-decoration:none;padding:13px 15px;border-radius:8px;font-weight:700;margin-bottom:10px}
.cancel-btn{width:100%;border:0;background:#eee;color:#111;padding:11px 15px;border-radius:8px;font-weight:700;cursor:pointer}
.search-panel,.menu-panel{display:none;position:fixed;left:0;right:0;top:70px;background:#fff;border-bottom:1px solid #ddd;z-index:999;padding:15px 18px;box-shadow:0 8px 22px rgba(0,0,0,.1)}
.search-panel.active,.menu-panel.active{display:block}
.search-panel input{width:100%;padding:12px 14px;border:1px solid #ccc;border-radius:6px;font-size:16px}
.menu-panel a{display:block;padding:12px 5px;text-decoration:none;color:#222;border-bottom:1px solid #eee}
@media(max-width:480px){.navbar{height:62px;padding:0 14px}.logo{font-size:23px}.search-panel,.menu-panel{top:62px}.image-list{padding:0 8px}.item{margin:9px auto}}
</style>
</head>
<body>

  <div class="nav-icon" onclick="toggleMenu()"><i class="fa-solid fa-bars"></i></div>

<div id="popup" class="popup" onclick="closePopup(event)">
  <div class="popup-box" onclick="event.stopPropagation()">
    <h3>Watch Now</h3>
    <p>Continue kore link open korun.</p>
    <a id="goLink" class="go-btn" href="#" target="_blank" rel="noopener">Go to Link</a>
    <button class="cancel-btn" onclick="hidePopup()">Close</button>
  </div>
</div>

<script>
function toggleMenu(){document.getElementById('menuPanel').classList.toggle('active');document.getElementById('searchPanel').classList.remove('active')}
function toggleSearch(){document.getElementById('searchPanel').classList.toggle('active');document.getElementById('menuPanel').classList.remove('active')}
function openPopup(link){document.getElementById('goLink').href=link;document.getElementById('popup').classList.add('active')}
function hidePopup(){document.getElementById('popup').classList.remove('active')}
function closePopup(e){if(e.target.id==='popup')hidePopup()}
function filterImages(q){q=(q||'').toLowerCase().trim();document.querySelectorAll('.item').forEach(function(item){item.style.display=item.dataset.name.includes(q)?'block':'none'})}
</script>
